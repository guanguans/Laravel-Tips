name: Update Stats

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  update-stats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT }}

      - name: Update stats.json and README counts
        run: ./scripts/update-stats.sh

      - name: Commit and push if changed
        run: |
          git config --global user.name 'GitHub Action'
          git config --global user.email 'action@github.com'
          git add stats.json README.md
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update tip counts" && git push)
